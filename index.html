<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIZRENT - Sewa Game & Aplikasi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fefce8;
            padding: 20px;
        }

        /* NAVBAR */
        .navbar {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #e8e4d8;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: #d4a84a;
            text-decoration: none;
        }

        .navLinks {
            display: flex;
            gap: 24px;
        }

        .navLinks a {
            text-decoration: none;
            color: #4a5568;
            font-size: 14px;
        }

        .loginBtn {
            color: #d4a84a !important;
            font-weight: 600;
        }

        /* HERO */
        .hero {
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
        }

        .hero h1 {
            font-size: 36px;
            color: #4a7c3f;
            margin-bottom: 12px;
        }

        .hero p {
            color: #8a9c7a;
            margin-bottom: 20px;
        }

        .heroBtn {
            display: inline-block;
            background: #d4a84a;
            color: white;
            text-decoration: none;
            padding: 8px 24px;
            border-radius: 30px;
            font-size: 14px;
        }

        /* SEARCH */
        .searchSection {
            max-width: 1000px;
            margin: 20px auto;
        }

        .searchInput {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e8e4d8;
            border-radius: 30px;
            font-size: 14px;
            background: white;
        }

        /* PRODUCTS */
        .productsSection {
            max-width: 1000px;
            margin: 40px auto;
        }

        .productItem {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #e8e4d8;
            flex-wrap: wrap;
            gap: 12px;
        }

        .productInfo h3 {
            font-size: 16px;
            color: #4a7c3f;
            margin-bottom: 4px;
        }

        .productInfo p {
            font-size: 12px;
            color: #8a9c7a;
        }

        .productRight {
            text-align: right;
        }

        .productPrice {
            font-size: 16px;
            font-weight: 700;
            color: #d4a84a;
        }

        .sewaBtn {
            background: #d4a84a;
            color: white;
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 6px;
        }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; text-align: center; }
            .productItem { flex-direction: column; text-align: center; }
            .productRight { text-align: center; }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="#" class="logo">🎮 FRIZRENT</a>
        <div class="navLinks">
            <a href="#">Beranda</a>
            <a href="#">Keranjang</a>
            <a href="#">Peminjaman</a>
            <a href="#" class="loginBtn">Login</a>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero">
        <h1>Sewa Game & Aplikasi</h1>
        <p>Premium favoritmu dengan harga terjangkau. Sewa harian, download langsung!</p>
        <a href="#" class="heroBtn">Lihat Koleksi →</a>
    </div>

    <!-- SEARCH -->
    <div class="searchSection">
        <input type="text" placeholder="Cari game atau aplikasi..." class="searchInput" id="searchInput" onkeyup="searchProducts()">
    </div>

    <!-- PRODUCTS -->
    <div class="productsSection" id="productsList"></div>

    <script>
        const products = [
            { name: "Game WoodAisem", desc: "perjalanan dihutan", price: 10000 },
            { name: "Aplikasi CakeShop Kia", desc: "Aplikasi Penjualan Cake", price: 150000 },
            { name: "Game Portal Jungle", desc: "Game platform mengambil koin", price: 5000 }
        ];

        function displayProducts(data) {
            const container = document.getElementById('productsList');
            container.innerHTML = '';
            data.forEach(p => {
                container.innerHTML += `
                    <div class="productItem">
                        <div class="productInfo">
                            <h3>${p.name}</h3>
                            <p>${p.desc}</p>
                        </div>
                        <div class="productRight">
                            <div class="productPrice">Rp ${p.price.toLocaleString()}</div>
                            <button class="sewaBtn" onclick="alert('Fitur sewa akan segera hadir')">Sewa</button>
                        </div>
                    </div>
                `;
            });
        }

        function searchProducts() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(search) || 
                p.desc.toLowerCase().includes(search)
            );
            displayProducts(filtered);
        }

        displayProducts(products);
    </script>

</body>
</html>
